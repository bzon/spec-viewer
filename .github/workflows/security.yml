name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC

permissions:
  security-events: write

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -quiet -exclude=G104,G204,G301,G304,G107 ./...
        # Excluded rules (expected for a local CLI tool):
        # G104: unhandled errors on best-effort cleanup (conn.Close, fsw.Add)
        # G204: subprocess with variable (exec open/xdg-open with URL)
        # G301: directory permissions (config dir uses 0755)
        # G304: file read with variable (paths validated by safePath)
        # G107: HTTP request with variable URL (instance reuse POST)
